repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        additional_dependencies: [structlog>=24.0.0, pytest]
        args: [--config-file=pyproject.toml]
  - repo: local
    hooks:
      - id: conventional-commit-hook
        name: Conventional Commits
        entry: conventional-commit-hook
        language: system
        stages: [commit-msg]
        always_run: true
