# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: conventional-commit-hook
  version: "0.1.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - conventional-commit-hook = conventional_commit_hook.main:entrypoint

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling >=1.24.0
  run:
    - python >=${{ python_min }},<4
    - structlog >=24.0.0

tests:
  - python:
      imports:
        - conventional_commit_hook
        - conventional_commit_hook.parser
        - conventional_commit_hook.validator
        - conventional_commit_hook.main
      pip_check: true
  - script:
      - conventional-commit-hook --help

about:
  homepage: https://github.com/millsks/conventional-commit-hook
  repository: https://github.com/millsks/conventional-commit-hook
  documentation: https://github.com/millsks/conventional-commit-hook#readme
  summary: A pre-commit hook that enforces Conventional Commits standards on commit messages
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - millsks
