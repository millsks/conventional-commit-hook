name: Repository Maintenance

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.2

      - name: Update pixi dependencies
        run: pixi update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_PAT }}
          commit-message: "chore(deps): update pixi dependencies"
          title: "chore(deps): automated dependency updates"
          body: |
            ## Automated Dependency Updates

            This PR updates pixi dependencies to the latest compatible versions.

            ### Verification
            - [ ] All tests pass
            - [ ] No breaking changes detected

            *This PR was automatically created by the Repository Maintenance workflow.*
          branch: automated/dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            maintenance

  cleanup-artifacts:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.2

      - name: Install dependencies
        run: pixi install

      - name: Run security audit
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-security-report.json || true

      - name: Upload security scan results
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: bandit-security-report.json
          retention-days: 30
